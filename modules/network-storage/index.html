                subtitle: 'A real scenario where poor file management cost the team time and credibility',
                content: [
                    { type: 'card', html: '<h2>Scenario: The Missing Model File</h2><p>A senior engineer is presenting PSCAD simulation results to AEMO during a critical GPS review meeting. The AEMO reviewer asks to see the model input parameters. The engineer opens the project folder on the network drive — but the model file is not there. Someone saved it locally, the filename does not match the project naming convention, and there are three different versions with no indication which is current.</p><p>The meeting is rescheduled. The client is not impressed. Two hours of senior time is wasted tracking down the right file.</p><p><strong>This is preventable.</strong> Vysus has network storage standards and SSD workflow procedures that, when followed, ensure every team member can find the right file at the right time.</p>' },
                    { type: 'success', title: 'The Core Principle', text: 'If you cannot find a file in under 30 seconds, the filing system has failed. Vysus network storage standards ensure every project document has one definitive location with a predictable naming convention.' },
                    { type: 'card', html: '<h3>The Vysus Network Structure</h3><p>Vysus uses a hierarchical network storage system organised by:</p><ul><li><strong>Business Unit</strong> — Grid Connection Engineering, Advisory, Power Systems, etc.</li><li><strong>Project</strong> — Each client project has a dedicated folder with a standardised sub-structure</li><li><strong>Work Package</strong> — Within each project, folders are organised by deliverable type</li></ul><h4>Standard Project Folder Structure:</h4><table class="data-table"><thead><tr><th>Folder</th><th>Contents</th><th>Example Files</th></tr></thead><tbody><tr><td>01_Project_Management</td><td>Plans, budgets, schedules, meeting minutes</td><td>ProjectPlan_v2.1.docx</td></tr><tr><td>02_Client_Correspondence</td><td>Emails, letters, RFIs</td><td>RFI_001_Transformer_Rating.pdf</td></tr><tr><td>03_Technical_Reports</td><td>Deliverable reports and memos</td><td>GPS_Document_v3.0.docx</td></tr><tr><td>04_Calculations</td><td>Spreadsheets, design calculations</td><td>ReactPower_Calc_Rev01.xlsx</td></tr><tr><td>05_Models</td><td>PSCAD, PSS/E, MATLAB models</td><td>PSCAD_FRT_Model_v2.pscx</td></tr><tr><td>06_Drawings</td><td>SLDs, layouts, schematics</td><td>SLD_ConnectionPoint_RevB.dwg</td></tr><tr><td>07_Reference</td><td>Standards, OEM data, NSP documents</td><td>AEMO_GPS_Template_2025.docx</td></tr><tr><td>08_QA</td><td>Review records, checklists</td><td>QA_Checklist_GPS_v1.xlsx</td></tr></tbody></table>' }

                content: [
                    { type: 'card', html: '<h2>The Vysus Naming Convention</h2><p>Every file on the network must follow the standard naming pattern:</p><p style="font-size:1.3rem; text-align:center; padding:1.5rem; background:rgba(0,227,169,0.1); border-radius:12px; margin:1.5rem 0; font-family:monospace;"><strong>[ProjectCode]_[DocType]_[Description]_[Version].[ext]</strong></p><h4>Components:</h4><ul><li><strong>ProjectCode</strong> — The IFS project code (e.g., GRD0500026)</li><li><strong>DocType</strong> — Abbreviated document type (GPS, CALC, RPT, DWG, MDL, MOM)</li><li><strong>Description</strong> — Brief description using underscores (no spaces)</li><li><strong>Version</strong> — v1.0, v2.0 for major revisions; v1.1, v1.2 for minor edits</li></ul><h4>Examples:</h4><table class="data-table"><thead><tr><th>File Type</th><th>Example Name</th></tr></thead><tbody><tr><td>GPS Document</td><td>GRD0500026_GPS_Armidale_Solar_v3.0.docx</td></tr><tr><td>Calculation</td><td>GRD0500026_CALC_Reactive_Power_Range_v1.2.xlsx</td></tr><tr><td>Model</td><td>GRD0500026_MDL_PSCAD_FRT_Study_v2.0.pscx</td></tr><tr><td>Drawing</td><td>GRD0500026_DWG_SLD_Connection_Point_RevB.dwg</td></tr><tr><td>Minutes</td><td>GRD0500026_MOM_AEMO_Review_20260215.docx</td></tr></tbody></table>' },
                    { type: 'warning', title: 'Common Naming Mistakes', text: 'Never use spaces in filenames (use underscores). Never use "final", "final_v2", "FINAL_REAL" — use proper version numbers. Never store working copies on your local desktop — always work from the network or use the SSD sync workflow.' },

                    { type: 'card', html: '<h2>Why We Use SSDs</h2><p>Grid connection engineering involves large simulation files. A single PSCAD model can be 500MB-2GB. Running these models over the network is painfully slow and can cause file corruption.</p><p>The <strong>SSD workflow</strong> solves this: you sync project files to a portable SSD for local work, then sync back to the network when done. This gives you local-speed performance with network-level backup and accessibility.</p><h3>SSD Workflow Steps</h3>' },
                    { type: 'html', html: '<div class="glass"><div class="process-flow"><div class="process-step"><div class="step-number">1</div><div class="step-title">Sync Down</div><div class="step-desc">Copy project folder from network to your SSD at start of day</div></div><div class="process-step"><div class="step-number">2</div><div class="step-title">Work Local</div><div class="step-desc">Run models and edit files from SSD — fast and reliable</div></div><div class="process-step"><div class="step-number">3</div><div class="step-title">Sync Up</div><div class="step-desc">Copy changed files back to network at end of day or milestone</div></div><div class="process-step"><div class="step-number">4</div><div class="step-title">Verify</div><div class="step-desc">Check file sizes match and no sync errors occurred</div></div></div></div>' },
                    { type: 'card', html: '<h3>SSD Sync Rules</h3><ul><li><strong>Always sync up before leaving the office</strong> — your SSD is not backed up. The network is.</li><li><strong>Check for conflicts</strong> — if someone else modified the same file on the network, resolve the conflict before overwriting</li><li><strong>Use robocopy or FreeFileSync</strong> — manual copy/paste misses files. Use sync tools that compare timestamps and detect changes.</li><li><strong>Lock model files</strong> — before syncing down, let your team know you are working on a model to avoid parallel editing</li><li><strong>Label your SSD</strong> — write your name and "VYSUS" on the SSD. If lost, it can be returned.</li></ul>' },

                content: [
                    { type: 'card', html: '<h2>File Conflicts</h2><p>The most common SSD workflow issue is <strong>file conflicts</strong> — when two people modify the same file simultaneously.</p><h3>How Conflicts Happen:</h3><ol><li>Engineer A syncs down project files to SSD on Monday morning</li><li>Engineer B modifies a calculation file on the network on Monday afternoon</li><li>Engineer A modifies the same calculation file on their SSD on Tuesday</li><li>Engineer A syncs up on Tuesday afternoon — B\'s changes are overwritten</li></ol><h3>Prevention:</h3><ul><li><strong>Communication</strong> — tell your team which files you are working on</li><li><strong>File locking</strong> — use "checked out" status in the project tracker</li><li><strong>Merge before overwrite</strong> — always check network timestamps before syncing up</li><li><strong>Use sync tools</strong> — FreeFileSync highlights conflicts and lets you choose which version to keep</li></ul>' },
                    { type: 'card', html: '<h3>Remote and Multi-Office Working</h3><p>With team members across AU, IN, and MY, remote access patterns vary:</p><table class="data-table"><thead><tr><th>Location</th><th>Network Access</th><th>Recommended Workflow</th></tr></thead><tbody><tr><td>Perth / Melbourne Office</td><td>Direct LAN</td><td>SSD for models, network for documents</td></tr><tr><td>India (Pune)</td><td>VPN</td><td>SSD for all large files, sync during off-peak hours</td></tr><tr><td>Malaysia (KL)</td><td>VPN</td><td>SSD for all large files, sync during off-peak hours</td></tr><tr><td>Working from Home</td><td>VPN</td><td>SSD preferred for models, small docs via OneDrive</td></tr></tbody></table>' },

                    { type: 'card', html: '<h3>Data Loss Recovery</h3><p>If files are accidentally deleted or overwritten:</p><ul><li><strong>Network files</strong> — contact IT. The network has nightly backups with 30-day retention. Recovery takes 2-4 hours.</li><li><strong>SSD files</strong> — if not synced to network, recovery depends on SSD health. First try: use Recuva or similar recovery software. Second: check if a colleague synced the same project recently.</li><li><strong>Email attachments</strong> — for client correspondence, check Sent Items for the last attachment version.</li></ul>' },
