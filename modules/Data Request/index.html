                        type: "card",
                        html: "<h2>Practical Tips for Submitting a Clean Request</h2><ul><li>Confirm eligibility and internal authorization first.</li><li>Use specific operating conditions or timestamps for custom snapshots.</li><li>Align your Purpose to NER references; avoid vague justifications.</li><li>Double-check invoice email and address to prevent billing delays.</li><li>Attach any internal approvals if your organization requires it.</li></ul><h3>Quick Checklist (One-Minute Review)</h3><ul><li>Eligibility confirmed.</li><li>Purpose selected and justified.</li><li>Data scope clearly defined.</li><li>Configuration chosen.</li><li>Invoice details complete.</li><li>Declaration signed and dated.</li></ul><p>Sample Form - Snapshot (Always refer AEMO website for latest form)</p>"
