            {

                subtitle: 'How a distributed engineering team delivers world-class grid connection services',
                content: [
                    { type: 'card', html: '<h2>Scenario: Your First Week at Vysus Grid Connection</h2><p>You have just joined the Vysus Grid Connection Engineering team. You are based in Perth, but your project lead is in Melbourne. Two of your team members are in Pune, India, and another is in Kuala Lumpur, Malaysia. You have three active projects, each at different stages of the connection process.</p><p>How do you know what to work on each day? How do you communicate effectively across time zones? How do you maintain quality when deliverables pass through multiple hands?</p><p>This module covers the <strong>Way of Working (WOW)</strong> — the agreed standards, communication protocols, and team practices that make Vysus Grid Connection function as one cohesive team despite being spread across three countries.</p>' },
                    { type: 'success', title: 'Why WOW Matters', text: 'A distributed team without clear working standards quickly fragments into isolated individuals. The WOW creates predictability — every team member knows how to find information, who to escalate to, when meetings happen, and what quality standards apply. This predictability is what allows us to scale.' },
                    { type: 'card', html: '<h3>The Five Pillars of Vysus WOW</h3><ol><li><strong>Structured Communication</strong> — defined channels, meeting cadence, and escalation paths</li><li><strong>Project Execution Framework</strong> — standard phases, milestones, and deliverable templates</li><li><strong>Quality Assurance</strong> — peer review, checklists, and approval workflows</li><li><strong>Knowledge Sharing</strong> — technical hub, lessons learned, mentoring program</li><li><strong>Continuous Improvement</strong> — retrospectives, process updates, Sentinel submissions</li></ol>' },

                    { type: 'card', html: '<h2>Meeting Cadence</h2><p>Vysus Grid Connection runs on a structured meeting rhythm designed to minimise meeting overload while ensuring alignment:</p><table class="data-table"><thead><tr><th>Meeting</th><th>Frequency</th><th>Duration</th><th>Purpose</th><th>Attendees</th></tr></thead><tbody><tr><td>Daily Standup</td><td>Daily (Mon-Fri)</td><td>15 min</td><td>Blockers, priorities, quick updates</td><td>All engineers on active projects</td></tr><tr><td>Project Review</td><td>Weekly</td><td>30-45 min</td><td>Per-project deep dive on progress, risks, decisions</td><td>Project team + lead</td></tr><tr><td>Team Meeting</td><td>Weekly</td><td>60 min</td><td>Cross-project updates, knowledge sharing, announcements</td><td>Full team</td></tr><tr><td>Technical Forum</td><td>Fortnightly</td><td>45 min</td><td>Technical presentation, lessons learned, new standards</td><td>Full team</td></tr><tr><td>Principal Review</td><td>Monthly</td><td>30 min</td><td>Portfolio health, resourcing, strategic decisions</td><td>Principals + leads</td></tr></tbody></table>' },

                    { type: 'card', html: '<h3>Communication Channels</h3><table class="data-table"><thead><tr><th>Channel</th><th>Use For</th><th>Do NOT Use For</th></tr></thead><tbody><tr><td>Microsoft Teams Chat</td><td>Quick questions, informal updates, availability checks</td><td>Technical decisions, formal client comms</td></tr><tr><td>Teams Project Channels</td><td>Project-specific discussions, file sharing, meeting notes</td><td>Personal messages, non-project topics</td></tr><tr><td>Email</td><td>Client correspondence, formal deliverables, audit trail items</td><td>Internal quick questions, file sharing</td></tr><tr><td>Phone/Video Call</td><td>Complex technical discussions, conflict resolution, mentoring</td><td>Simple status updates</td></tr><tr><td>IFS (Project System)</td><td>Timesheets, budgets, project milestones, formal approvals</td><td>Technical discussions</td></tr></tbody></table>' },

                content: [
                    { type: 'card', html: '<h2>Project Phases</h2><p>Every grid connection project at Vysus follows a standard phase structure. The phases align with the NER connection process but include additional internal milestones:</p>' },
                    { type: 'html', html: '<div class="glass"><div class="process-flow"><div class="process-step"><div class="step-number">R0</div><div class="step-title">Proposal & Scoping</div><div class="step-desc">Client brief, scope definition, proposal, contract</div></div><div class="process-step"><div class="step-number">R1</div><div class="step-title">Studies & GPS</div><div class="step-desc">Data gathering, modelling, GPS preparation, AEMO submission</div></div><div class="process-step"><div class="step-number">R2</div><div class="step-title">Support & Commissioning</div><div class="step-desc">AEMO queries, GPS updates, commissioning support, RPS</div></div></div></div>' },
                    { type: 'card', html: '<h3>Quality Assurance Process</h3><p>Every deliverable must pass through the QA process before it reaches the client or AEMO:</p><ol><li><strong>Self-check</strong> — author reviews against the QA checklist</li><li><strong>Peer review</strong> — a second engineer reviews for technical accuracy and completeness</li><li><strong>Lead review</strong> — project lead reviews for scope compliance and consistency</li><li><strong>Principal sign-off</strong> — for GPS documents and major deliverables only</li></ol><h4>QA Checklist Items (for GPS):</h4><ul><li>All S5.2.5 clauses addressed with proposed access standard level stated</li><li>Simulation evidence attached for all performance claims</li><li>Single line diagram current and consistent with text</li><li>OEM data referenced and attached</li><li>No tracked changes or comments remaining</li><li>File naming convention followed</li><li>Spelling and formatting consistent</li><li>Client project name and code correct throughout</li></ul>' },

                    { type: 'card', html: '<h2>The Technical Knowledge Hub</h2><p>The Knowledge Hub is the team\'s shared repository of technical knowledge, lessons learned, and reference material. It is a living resource — every team member is expected to contribute.</p><h3>Knowledge Hub Structure:</h3><ul><li><strong>Technical Guides</strong> — how-to documents for common tasks (e.g., "How to set up a PSCAD FRT study")</li><li><strong>Lessons Learned</strong> — post-project summaries of what went well and what to improve</li><li><strong>AEMO Query Library</strong> — database of common AEMO questions and proven responses</li><li><strong>Standards Updates</strong> — summaries of NER rule changes and their implications</li><li><strong>OEM Reference</strong> — technical datasheets and capability summaries for common equipment</li></ul>' },
                    { type: 'card', html: '<h3>Sentinel Competition</h3><p>Vysus runs the annual Sentinel Competition to encourage innovation and process improvement. Team members submit proposals for tools, processes, or knowledge resources that would benefit the team.</p><h4>Recent Sentinel Winners:</h4><ul><li>GPS Requirements Checklist — automated checklist that reduces GPS preparation errors by 40%</li><li>PSCAD Template Library — pre-configured models for common IBR configurations</li><li>AEMO Query Response Templates — standardised responses to frequently asked AEMO questions</li><li>Network Storage Standard — the filing and SSD workflow covered in the Network Storage module</li></ul>' },
                    { type: 'card', html: '<h3>Mentoring Program</h3><p>Every entry-level and new-joiner is paired with a senior/lead mentor:</p><ul><li><strong>First month</strong> — weekly 30-min check-ins, guided walk-through of first project tasks</li><li><strong>Months 2-6</strong> — fortnightly check-ins, increasing independence with mentor review of work</li><li><strong>Months 6-12</strong> — monthly check-ins, mentor available for escalation</li><li><strong>Ongoing</strong> — annual development discussion, career planning support</li></ul>' },

                    { type: 'card', html: '<h3>Retrospectives</h3><p>At the end of each project (or major phase), the team runs a structured retrospective:</p><ol><li><strong>What went well?</strong> — celebrate successes and identify practices to continue</li><li><strong>What could improve?</strong> — honest assessment of challenges without blame</li><li><strong>Action items</strong> — specific, assigned improvements for next time</li></ol><p>Retrospective outputs feed into the Knowledge Hub as Lessons Learned and may trigger WOW updates if a process change is warranted.</p>' },
